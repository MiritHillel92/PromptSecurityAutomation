name: Extension Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      PROMPT_SECURITY_API_KEY: ${{ secrets.PROMPT_SECURITY_API_KEY }}
      PROMPT_SECURITY_API_DOMAIN: ${{ vars.PROMPT_SECURITY_API_DOMAIN || 'eu.prompt.security' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Run tests
        run: xvfb-run --auto-servernum pytest tests/ -v --alluredir=allure-results --reruns 2 --reruns-delay 5

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          if-no-files-found: ignore
          retention-days: 30

  publish-report:
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Checkout gh-pages history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results/

      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev

      - name: Copy history from previous report
        run: |
          mkdir -p allure-results/history
          if [ -d gh-pages/history ]; then
            cp -r gh-pages/history allure-results/history
          fi

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      - name: Link to report in job summary
        run: |
          echo "## Test Report" >> $GITHUB_STEP_SUMMARY
          echo "[View Allure Report](https://MiritHillel92.github.io/PromptSecurityAutomation/)" >> $GITHUB_STEP_SUMMARY
